name: visual-v2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "docs/ui/bible/**"
      - "docs/visual/parity/**"
      - "scripts/render-bible.mjs"
      - "scripts/gen-bible-*.mjs"
      - "scripts/visual-v2/**"
      - "src/**"
      - "bin/sumocode.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/visual-v2.yml"
  push:
    branches:
      - main
    paths:
      - "docs/ui/bible/**"
      - "docs/visual/parity/**"
      - "scripts/render-bible.mjs"
      - "scripts/gen-bible-*.mjs"
      - "scripts/visual-v2/**"
      - "src/**"
      - "bin/sumocode.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/visual-v2.yml"
  workflow_dispatch:

jobs:
  review-pack:
    name: build V2 parity review pack
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Select runner Chrome
        shell: bash
        run: |
          set -euo pipefail
          for candidate in google-chrome google-chrome-stable chromium chromium-browser; do
            if command -v "$candidate" >/dev/null 2>&1; then
              chrome_path="$(command -v "$candidate")"
              "$chrome_path" --version
              echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$chrome_path" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "No runner Chrome executable found" >&2
          exit 1

      - name: Render Visual Bible targets
        run: pnpm render:bible

      - name: Build V2 review pack
        run: pnpm visual:ci

      - name: Upload V2 parity review pack
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cathedral-v2-parity-review-pack
          path: docs/visual/out/parity
          if-no-files-found: error
          retention-days: 14
