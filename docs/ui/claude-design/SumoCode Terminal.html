<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SumoCode · Cathedral terminal</title>
  <link rel="stylesheet" href="tokens.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Terminal.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>
  <script type="text/babel" src="Modals.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SCREENS = [
      { id: 'idle',      label: 'idle' },
      { id: 'streaming', label: 'streaming' },
      { id: 'tool',      label: 'tool-running' },
      { id: 'approval',  label: 'approval' },
      { id: 'memory',    label: 'memory' },
      { id: 'palette',   label: 'palette' },
    ];

    function App() {
      const initial = (typeof location !== 'undefined' && location.hash.replace('#',''))
        || localStorage.getItem('sumocode.screen') || 'idle';
      const [screen, setScreen] = useState(SCREENS.some(s => s.id === initial) ? initial : 'idle');
      useEffect(() => {
        try { localStorage.setItem('sumocode.screen', screen); location.hash = screen; } catch (e) {}
      }, [screen]);

      // Keyboard nav: arrow keys cycle screens
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            const i = SCREENS.findIndex(s => s.id === screen);
            setScreen(SCREENS[(i + 1) % SCREENS.length].id);
          } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            const i = SCREENS.findIndex(s => s.id === screen);
            setScreen(SCREENS[(i - 1 + SCREENS.length) % SCREENS.length].id);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [screen]);

      // Build left rows + modal per screen
      let leftRows, modal = null;
      switch (screen) {
        case 'idle':
          leftRows = buildIdleRows();
          break;
        case 'streaming':
          leftRows = buildStreamingRows();
          break;
        case 'tool':
          leftRows = buildToolRows();
          break;
        case 'approval':
          leftRows = buildToolRows();
          modal = <ApprovalModal />;
          break;
        case 'memory':
          leftRows = buildIdleRows();
          modal = <MemoryEditor />;
          break;
        case 'palette':
          leftRows = buildIdleRows();
          modal = <CommandPalette />;
          break;
        default:
          leftRows = buildIdleRows();
      }

      return (
        <div className="stage" data-screen-label={'SumoCode · ' + screen}>
          <div className="shell">
            <div className="nav">
              {SCREENS.map((s, i) => (
                <React.Fragment key={s.id}>
                  {i > 0 && <span className="sep">│</span>}
                  <button
                    className={screen === s.id ? 'active' : ''}
                    onClick={() => setScreen(s.id)}
                  >{s.label}</button>
                </React.Fragment>
              ))}
            </div>

            <Terminal
              active={screen}
              onSelect={setScreen}
              screens={SCREENS}
              leftRows={leftRows}
              sidebarRows={SIDEBAR_ROWS}
              modal={modal}
              dimUnder={true}
            />

            <div className="hint">
              SumoCode v0.1.0 · Cathedral · 160 × 45 monospace · ←→ to step screens
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
